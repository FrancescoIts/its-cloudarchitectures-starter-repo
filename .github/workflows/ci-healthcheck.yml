name: CI/CD + Healthcheck

on:
  push:
    branches: ["main"]

jobs:
  # -------------------------
  # JOB 1 — TEST MATRIX
  # -------------------------
  test-matrix:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18, 20]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # -------------------------
  # JOB 2 — BUILD & PUSH
  # -------------------------
  build-and-push:
    needs: test-matrix
    runs-on: [self-hosted]

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/its-node-demo
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$TAG .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push image
        run: docker push $IMAGE_NAME:$TAG

      - name: Tag and push as latest
        run: |
          docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

  # -------------------------
  # JOB 3 — DEPLOY via SSH
  # -------------------------
  deploy:
    needs: build-and-push
    runs-on: [selfhosted]

    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull immagine aggiornata
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/its-node-demo:latest

      - name: Stop e rimozione container precedente
        run: |
          docker stop its-node-demo || true
          docker rm its-node-demo || true

      - name: Avvio nuovo container
        run: |
          docker run -d \
            -p 8181:3000 \
            --name its-node-demo \
            ${{ secrets.DOCKERHUB_USERNAME }}/its-node-demo:latest

      # -------------------------
      # HEALTHCHECK DOPO DEPLOY
      # -------------------------
      - name: Wait for container health
        shell: pwsh
        run: |
          Write-Host ">>> Controllo health container..."
          for ($i = 1; $i -le 10; $i++) {
            $STATUS = docker inspect --format='{{.State.Health.Status}}' its-node-demo 2>$null
            if (-not $STATUS) { $STATUS = "unknown" }
            Write-Host "Tentativo $i - Health status: $STATUS"

            if ($STATUS -eq "healthy") {
              Write-Host "Container is healthy!"
              exit 0
            }

            Write-Host "Waiting 3s..."
            Start-Sleep -Seconds 3
          }

          Write-Host "ERRORE: container unhealthy dopo 30 secondi"
          exit 1


      # -------------------------
      # ESPORTAZIONE LOG
      # -------------------------
      - name: Export container logs
        if: always()
        shell: pwsh
        run: |
          docker logs its-node-demo 2>&1 | Out-File -FilePath container.log -Encoding utf8
          Get-Content container.log

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: container.log
          retention-days: 7
